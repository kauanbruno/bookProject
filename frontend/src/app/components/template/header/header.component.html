<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<mat-toolbar class="header mat-elevation-z12">
    <span class="header-logo">
        <a routerLink="/">
            <svg class="logo" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" style="stop-color:#673ab7"/>
                  <stop offset="100%" style="stop-color:#9c27b0"/>
                </linearGradient>
                <linearGradient id="pageGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" style="stop-color:#f5f5f5"/>
                  <stop offset="100%" style="stop-color:#e0e0e0"/>
                </linearGradient>
              </defs>
              <g transform="translate(0, 2)">
                <path d="M8 6 L8 38 Q8 40 10 40 L38 40 Q40 40 40 38 L40 6 Q40 4 38 4 L10 4 Q8 4 8 6" fill="url(#bookGradient)"/>
                <rect x="8" y="4" width="6" height="36" rx="1" fill="#5a2d91"/>
                <path d="M14 6 L14 36 L38 36 Q39 36 39 35 L39 7 Q39 6 38 6 Z" fill="url(#pageGradient)"/>
                <line x1="18" y1="12" x2="34" y2="12" stroke="#bdbdbd" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="18" y1="17" x2="32" y2="17" stroke="#bdbdbd" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="18" y1="22" x2="30" y2="22" stroke="#bdbdbd" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M30 4 L30 14 L33 11 L36 14 L36 4" fill="#ff5722"/>
              </g>
              <text x="50" y="28" font-family="Roboto, Arial, sans-serif" font-size="22" font-weight="500" fill="#333">
                the<tspan fill="url(#bookGradient)" font-weight="700">Book</tspan>Project
              </text>
            </svg>
        </a>
    </span> 
    <button mat-icon-button class="menu-toggle" (click)="toggleMenu()" *ngIf="isMobileMenu">
        <span class="material-icons">menu</span>
    </button>
    <span class="header-nav" [class.mobile-open]="mobileMenuOpen">
        <a routerLink="/books" title="Livros">
            <span class="material-icons">library_books</span>
            <span class="nav-label">Livros</span>
        </a>
        <a routerLink="/dashboard" title="Dashboard" *ngIf="isLoggedIn">
            <span class="material-icons">dashboard</span>
            <span class="nav-label">Dashboard</span>
        </a>
        <a routerLink="/manage" *ngIf="isLoggedIn && authService.isAdmin()" title="Gerenciar Livros">
            <span class="material-icons">post_add</span>
            <span class="nav-label">Gerenciar</span>
        </a>
    </span>
    <span class="spacer"></span>
    <span *ngIf="isLoggedIn" class="user-info">
        <span class="user-name">{{ (currentUser$ | async)?.name }}</span>
        <button mat-icon-button (click)="logout()" title="Sair">
            <span class="material-icons">logout</span>
        </button>
    </span>
    <button mat-icon-button (click)="toggleTheme()" class="theme-toggle" [title]="isDarkMode ? 'Modo Claro' : 'Modo Escuro'">
        <span class="material-icons">{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</span>
    </button>
    <a *ngIf="!isLoggedIn" routerLink="/login" mat-button class="login-btn">
        <span class="material-icons">login</span>
        <span class="login-label">Login</span>
    </a>
</mat-toolbar>
<div class="overlay" *ngIf="mobileMenuOpen" (click)="closeMenu()"></div>
